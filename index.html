
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诺亦腾东升具身智能机器人训练中心</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
<div class="overlay">
<h1>诺亦腾东升具身智能机器人训练中心</h1>
<p>Embodied AI · Motion Capture · Robot Training</p>
<a href="#booking" class="btn">立即预约参观</a>
</div>
</header>

<section class="intro">
<h2>中心介绍</h2>
<p>
专为具身智能与机器人企业打造的高标准综合训练与数据采集平台。
</p>
</section>

<section class="cards">
<div class="card">
<h3>运控训练场</h3>
<p>支持双足、轮式、轮足机器人训练。</p>
</div>

<div class="card">
<h3>全身动捕采集区</h3>
<p>18颗高精度光学追踪摄像头。</p>
</div>

<div class="card">
<h3>UMI 操作采集区</h3>
<p>支持跨本体机器人数据采集。</p>
</div>

<div class="card">
<h3>模拟场景区域</h3>
<p>超市、客厅、厨房、流水线等真实场景。</p>
</div>
</section>

<section id="booking" class="booking">
<h2>场地参观预约</h2>

<form id="bookingForm">
<input type="text" placeholder="预约公司" required>
<input type="number" placeholder="参观人数" required>
<input type="date" required>

<select required>
<option>10:00 - 10:15</option>
<option>10:15 - 10:30</option>
<option>10:30 - 10:45</option>
<option>11:00 - 11:15</option>
<option>14:00 - 14:15</option>
<option>15:00 - 15:15</option>
<option>16:00 - 16:15</option>
<option>17:00 - 17:15</option>
</select>

<textarea placeholder="备注"></textarea>

<button type="submit">提交预约</button>
</form>

<div id="status"></div>
</section>

<footer>
© 诺亦腾东升具身智能机器人训练中心
</footer>

<script src="script.js"></script>
</body>
</html>
