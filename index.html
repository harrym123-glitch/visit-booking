<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>诺亦腾东升具身智能机器人训练中心｜参观预约</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <img src="logo.webp" alt="NOITOM ROBOTICS" class="logo" />
    <a href="admin.html" class="admin-link">管理后台</a>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">EMBODIED INTELLIGENCE TRAINING CENTER</p>
      <h1>诺亦腾东升具身智能机器人训练中心</h1>
      <p class="subtitle">场地参观预约系统</p>
      <div class="hero-line"></div>
    </section>

    <section class="intro-card">
      <h2>场地介绍</h2>
      <p>
        本中心面向具身智能机器人训练、动作捕捉、数据采集、遥操作验证与多场景交互测试等需求，
        配备动作捕捉区、运控训练区、高精度交互数据采集区、UMI 数据采集区及模拟场景区域。
      </p>
      <div class="zone-grid">
        <span>动作捕捉区</span>
        <span>运控训练区</span>
        <span>高精度交互数据采集区</span>
        <span>UMI 数据采集区</span>
        <span>模拟场景区域</span>
      </div>
    </section>

    <section class="booking-card">
      <h2>预约参观</h2>
      <p class="form-note">请填写参观预约信息，提交后工作人员将根据场地安排进行确认。</p>
      <form id="bookingForm">
        <label>
          预约公司
          <input type="text" id="company" placeholder="请输入公司 / 单位名称" required />
        </label>

        <label>
          参观人数
          <input type="number" id="peopleCount" min="1" max="200" placeholder="请输入人数" required />
        </label>

        <label>
          日期
          <input type="date" id="date" required />
        </label>

        <label>
          时间
          <select id="timeSlot" required>
            <option value="">请选择时间</option>
          </select>
        </label>

        <button type="submit">提交预约</button>
        <p id="message" class="message"></p>
      </form>
    </section>
  </main>

  <footer>© 诺亦腾东升具身智能机器人训练中心｜场地参观预约系统</footer>

  <script type="module" src="app.js"></script>
</body>
</html>
