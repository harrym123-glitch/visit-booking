<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中关村（海淀）具身智能产业园·诺亦腾机器人跨本体数采训练中心</title>
  <link rel="icon" href="assets/nr-logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-card">
      <a class="logo-card" href="https://noitomrobotics.cn/" target="_blank" rel="noopener">
        <img src="assets/nr-logo.png" alt="Noitom Robotics" class="brand-logo" />
      </a>

      <p class="eyebrow">NOITOM ROBOTICS · VISIT BOOKING</p>
      <h1>中关村（海淀）具身智能产业园·诺亦腾机器人跨本体数采训练中心</h1>
      <p class="subtitle">面向具身智能、机器人训练、跨本体数据采集与多场景验证的参观预约入口。</p>

      <form id="bookingForm" class="booking-form">
        <div class="field">
          <label for="company">预约公司</label>
          <input id="company" name="company" type="text" placeholder="请输入公司 / 单位名称" required />
        </div>

        <div class="grid-two">
          <div class="field">
            <label for="people">参观人数</label>
            <input id="people" name="people" type="number" min="1" max="200" placeholder="例如：6" required />
          </div>
          <div class="field">
            <label for="date">参观日期</label>
            <input id="date" name="date" type="date" required />
          </div>
        </div>

        <div class="field">
          <label for="time">参观时间</label>
          <select id="time" name="time" required>
            <option value="">请选择时间</option>
          </select>
          <small>开放时间：10:00–18:00，每 15 分钟一个预约时间。</small>
        </div>

        <button id="submitBtn" type="submit">提交预约</button>
        <p id="message" class="message"></p>
      </form>

      <div class="footer-actions">
        <a href="admin.html">后台管理</a>
        <span>·</span>
        <a href="https://noitomrobotics.cn/" target="_blank" rel="noopener">进入官网</a>
      </div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
