<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 预约记录</title>
  <link rel="icon" href="assets/nr-logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <main class="admin-wrap">
    <section id="loginBox" class="admin-card login-card">
      <a href="https://noitomrobotics.cn/" target="_blank" class="admin-logo"><img src="assets/nr-logo.png" alt="NR Logo" /></a>
      <h1>后台管理</h1>
      <p>中关村（海淀）具身智能产业园·诺亦腾机器人跨本体数采训练中心</p>
      <input id="username" placeholder="用户名" />
      <input id="password" type="password" placeholder="密码" />
      <button id="loginBtn">登录</button>
      <p id="loginStatus" class="form-status"></p>
    </section>

    <section id="dashboard" class="admin-dashboard hidden">
      <div class="dashboard-head">
        <div><h1>预约记录</h1><p>查看、导出与管理参观预约。</p></div>
        <div class="actions"><button id="exportBtn">导出 CSV</button><button id="logoutBtn" class="ghost">退出</button></div>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>预约公司</th><th>人数</th><th>日期</th><th>时间</th><th>提交时间</th><th>操作</th></tr></thead>
          <tbody id="bookingRows"></tbody>
        </table>
        <p id="emptyText" class="empty">暂无预约记录</p>
      </div>
    </section>
  </main>
  <script type="module" src="admin.js"></script>
</body>
</html>
