<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预约管理后台</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="admin-page">
    <section id="loginBox" class="admin-login">
      <img src="logo.webp" alt="NOITOM ROBOTICS" class="logo" />
      <h1>管理后台</h1>
      <input id="username" type="text" placeholder="账号" />
      <input id="password" type="password" placeholder="密码" />
      <button id="loginBtn">登录</button>
      <p id="loginMsg" class="message"></p>
    </section>

    <section id="dashboard" class="dashboard hidden">
      <div class="dashboard-head">
        <div>
          <img src="logo.webp" alt="NOITOM ROBOTICS" class="admin-logo" />
          <h1>预约记录</h1>
        </div>
        <div class="admin-actions">
          <button id="exportBtn">导出 CSV</button>
          <button id="logoutBtn" class="secondary-btn">退出</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>预约公司</th>
              <th>人数</th>
              <th>日期</th>
              <th>时间</th>
              <th>提交时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
      <p id="emptyMsg" class="empty-msg">暂无预约记录</p>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
