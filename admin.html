<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预约后台管理</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-body">
  <main class="admin-container">
    <section id="loginPanel" class="login-card">
      <h1>后台登录</h1>
      <p>查看场地参观预约记录</p>
      <input id="adminUser" placeholder="账号" />
      <input id="adminPass" type="password" placeholder="密码" />
      <button id="loginBtn">登录</button>
      <p id="loginMsg" class="message"></p>
    </section>

    <section id="adminPanel" class="admin-panel hidden">
      <div class="admin-top">
        <div>
          <h1>预约记录</h1>
          <p>可查看、删除、导出预约信息。</p>
        </div>
        <div class="actions">
          <button id="refreshBtn">刷新</button>
          <button id="exportBtn">导出 CSV</button>
          <button id="logoutBtn" class="ghost">退出</button>
        </div>
      </div>
      <div class="filters">
        <input id="searchInput" placeholder="搜索姓名 / 单位 / 电话" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>提交时间</th><th>姓名</th><th>电话</th><th>单位</th><th>人数</th><th>日期</th><th>时间段</th><th>备注</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="bookingTable"></tbody>
        </table>
      </div>
      <p id="adminMsg" class="message"></p>
    </section>
  </main>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
